        // --- 画像リサイズ＆圧縮ロジック (高解像度版 2560px, 95%) ---
        const compressImage = (file, maxWidth = 2560, maxHeight = 2560, quality = 0.95) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) { height = Math.round((height *= maxWidth / width)); width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width = Math.round((width *= maxHeight / height)); height = maxHeight; }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        const base64Data = dataUrl.split(',')[1];
                        
                        resolve({ previewUrl: dataUrl, base64Data: base64Data });
                    };
                    img.onerror = () => reject(new Error("PCブラウザ非対応の形式（iPhoneのHEIC形式など）、またはファイルが破損しています。標準的なJPEGやPNGをお試しください。"));
                };
                reader.onerror = () => reject(new Error("ファイルの読み込み自体に失敗しました。"));
            });
        };

            `;

                                        <h3 className="text-xl md:text-2xl font-bold flex items-center gap-3 text-emerald-600">
                                            <Icon name="CheckCircle" className="w-6 h-6"/> 八大線の統合解析
                                        </h3>
                                        <div className="flex gap-2">
                                            <button onClick={() => toggleDetails('lines-section', true)} className="text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 hover:bg-emerald-100 px-4 py-1.5 rounded-full transition-colors shadow-sm">全て開く</button>
                                            <button onClick={() => toggleDetails('lines-section', false)} className="text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 hover:bg-emerald-100 px-4 py-1.5 rounded-full transition-colors shadow-sm">全て閉じる</button>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        {result.readings.lines.map(line => (
                                            <Accordion key={line.name} title={line.name} icon="CheckCircle" theme="emerald">
                                                <div className="grid md:grid-cols-2 gap-4 mb-5">
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <p className="text-xs text-slate-500 mb-2 border-b border-slate-200 pb-1 font-bold">左手 (先天)</p>
                                                        <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{line.left_meaning}</p>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <p className="text-xs text-slate-500 mb-2 border-b border-slate-200 pb-1 font-bold">右手 (後天)</p>
                                                        <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{line.right_meaning}</p>
                                                    </div>
                                                </div>
                                                <div className="bg-emerald-50 p-4 rounded-lg border-l-4 border-emerald-500">
                                                    <p className="text-sm md:text-base font-bold text-emerald-800"><span className="text-emerald-600 mr-2">【賢者の断言】</span>{line.overall}</p>
                                                </div>
                                            </Accordion>
                                        ))}
                                    </div>
                                </div>
                                
                                {/* --- ★改修：八つの丘エリア --- */}
                                <div id="mounts-section" className="pt-4">
                                    <div className="flex flex-col sm:flex-row sm:items-end justify-between border-b border-indigo-200 pb-2 mb-4 gap-3">
                                        <h3 className="text-xl md:text-2xl font-bold flex items-center gap-3 text-indigo-600">
                                            <Icon name="CircleDot" className="w-6 h-6"/> 運命を蓄える「八つの丘」
                                        </h3>
                                        <div className="flex gap-2">
                                            <button onClick={() => toggleDetails('mounts-section', true)} className="text-xs font-bold text-indigo-700 bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 px-4 py-1.5 rounded-full transition-colors shadow-sm">全て開く</button>
                                            <button onClick={() => toggleDetails('mounts-section', false)} className="text-xs font-bold text-indigo-700 bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 px-4 py-1.5 rounded-full transition-colors shadow-sm">全て閉じる</button>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        {result.readings.mounts.map(mount => (
                                            <Accordion key={mount.name} title={mount.name} icon="CircleDot" theme="indigo">
                                                <p className="text-sm md:text-base text-slate-700 leading-relaxed whitespace-pre-wrap">{mount.meaning}</p>
                                            </Accordion>
                                        ))}
                                    </div>
                                </div>

                                <div className="pt-4 grid md:grid-cols-2 gap-6">
                                    <Accordion title="深層心理への洞察" icon="Eye" theme="slate" defaultOpen={true}>
                                        <p className="text-slate-700 italic leading-relaxed text-sm md:text-base whitespace-pre-wrap">"{result.insight}"</p>
                                    </Accordion>
                                    
                                    <Accordion title="今日の絶対的指針" icon="Sparkles" theme="amber" defaultOpen={true}>
                                        <p className="text-base md:text-lg font-bold text-amber-800 leading-relaxed whitespace-pre-wrap">{result.advice_of_the_day}</p>
                                    </Accordion>
                                </div>
                            </section>
                        )}
                    </main>

                    <button 
                        onMouseDown={handlePressStart} onMouseUp={handlePressEnd} onMouseLeave={handlePressEnd}
                        onTouchStart={handlePressStart} onTouchEnd={handlePressEnd}
                        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-white border border-slate-300 z-[90] flex items-center justify-center cursor-pointer select-none shadow-[0_4px_15px_rgba(0,0,0,0.15)] hover:shadow-[0_8px_25px_rgba(0,0,0,0.2)] hover:scale-110 transition-all duration-300"
                        title="秘伝の書 (2秒長押しで開く)"
                    >
                        <Icon name="BookOpen" className="w-6 h-6 text-slate-500" />
                    </button>
                    
                    <footer className="mt-16 text-center text-xs text-slate-500 pb-8 relative z-10">
                        <p>&copy; 2077 SYNCHRONICITY Ultimate.</p>
                        <p>The AI's decision is absolute.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
